# UNITREE_G1_SONIC 8-window — QwenPI_CE scaled up after the run3 breakthrough
# Single window ("run in a circle", 749 frames). Goal: prove the FSQ-aware loss
# escapes the mean-template solution the stock PI_v3 flow head converged to
# (doc/sonic_starvla_swap_brainstorm.html §11.1). Breakthrough criteria:
#   bin_acc >> 16.5% (stock) and MSE64 << 0.0236 (run3's per-window-mean template).
# Then scale back to the 8-window sonic_lafan_flow3 mixture.
run_id: sonic_qwen3_5_4b_ce
run_root_dir: /home/david/work/isaaclab-experience/LeSONIC/outputs/starvla
seed: 42
wandb_entity: ""
wandb_project: starVLA_SONIC
is_debug: false
version_id: "0.21"

framework:
  name: QwenPI_CE
  qwenvl:
    base_vlm: Qwen/Qwen3.5-4B
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2560
  action_model:
    action_model_type: LayerwiseFM   # unused by QwenPI_CE (kept for config-compat plumbing)
    action_dim: 78
    state_dim: 46
    action_horizon: 40
    n_bins: 33                       # k in [-16,16], value = k/16 (observed range k in [-11,9])
    grid: 16.0
    ce_hidden_dim: 1024
    ce_num_layers: 6
    ce_num_heads: 8

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /home/david/work/isaaclab-experience/LeSONIC/datasets
    data_mix: sonic_lafan_flow3
    lerobot_version: v2.0
    sequential_step_sampling: false
    per_device_batch_size: 4
    load_all_data_for_training: true
    video_backend: torchvision_av
    include_state: true

trainer:
  max_train_steps: 6000              # epoch-matched to the GR00T flow3 anchor (24k samples)
  num_warmup_steps: 300
  save_interval: 500
  eval_interval: 100000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: 'qwen_vl_interface'
  keep_last_checkpoints: 3
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

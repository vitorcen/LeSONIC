# UNITREE_G1_SONIC BonesSeed — StarVLA QwenGR00T_v2 on Qwen3.5-4B.
#
# Mirrors the PUBLISHED winning PickOrange recipe (wsagi/StarVLA-Qwen3.5-4B-GR00T_v2,
# strict 66.7%): GR00T N1.7 head (DiT-N17 + VLLN + AlternateVLDiT + no future tokens)
# on a Qwen3.5-4B backbone, with the corrected MID-layer feature (select_layer=12),
# GR00T-faithful truncation (pop LLM layers above 12) and top-4 UNFREEZE of the
# kept layers (8-11). See LeIsaac so101_qwen35_4b_gr00t_v2_midlayer_unfreeze4_trunc.yaml
# and .memory/e1-midlayer-sweep-live-state for why each delta is set this way.
#
# SONIC-specific vs PickOrange: action_dim 78 (motion_token 64 + L/R hand 7+7),
# state_dim 46 (7 joint groups 43 + projected_gravity 3), action_horizon 40 (WBC chunk).
# Action normalization = IDENTITY (data_config keeps the FSQ k/16 grid intact); state
# = min_max (PI_v3-style 256-bin discretization needs [-1,1]). data_mix = sonic_bonesseed.
#
# Task = open-loop motion-token generation (memorization, no held-out): score by
# open-loop token-MSE sweep (LeSONIC standard), NOT closed-loop Isaac. Reference:
# GR00T N1.7 best ~0.0011 frame-MSE / per-motion-mean template ~0.039. FlowDP-SONIC 0.00059.
run_id: sonic_qwen3_5_4b_gr00t_v2
run_root_dir: /root/autodl-tmp/starvla-outputs
seed: 42
wandb_entity: ""
wandb_project: starVLA_SONIC
is_debug: false
version_id: "0.21"

framework:
  name: QwenGR00T_N17
  qwenvl:
    base_vlm: /root/autodl-tmp/models/Qwen3.5-4B   # StarVLA auto-selects the Qwen3.5 interface ("Qwen3.5" in path)
    attn_implementation: flash_attention_2          # dead on Qwen3 path (forced sdpa); kept for parity
    vl_hidden_dim: 2560                             # Qwen3.5-4B text hidden; auto-overridden at runtime
    tune_top_llm_layers: 4                          # unfreeze top 4 of the KEPT LLM layers (= layers 8-11 after truncate)
    select_layer: 12                                # mid layer (corrected; last-layer was the 8B porting bug)
    truncate_to_select_layer: true                  # GR00T-faithful pop → layers[-4:] = used top (8-11), not discarded
  action_model:
    action_dim: 78                                  # motion_token(64) + left/right hand joints(7+7) — mirrors GR00T embodiment
    state_dim: 46                                   # 7 joint groups(43) + projected_gravity(3)
    action_horizon: 40                              # SONIC WBC chunk (vs PickOrange 16)
    action_model_type: "DiT-N17"                    # inner 1536 = 32 heads x 48 (N1.7 ckpt shape)
    use_vlln: true
    use_alternate_vl_dit: true
    attend_text_every_n_blocks: 2
    state_dropout_prob: 0.2                          # N1.7 finetune value
    num_target_vision_tokens: 0                      # future tokens removed (N1.7)
    vl_self_attention_cfg: null
    vl_proj_dim: null                                # cross_attention_dim aligns to 2560 at runtime
    diffusion_model_cfg:
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /root/autodl-tmp/datasets
    data_mix: sonic_bonesseed                        # 7 motions / 3815 frames (sonic_vla_lerobot)
    lerobot_version: v2.0                             # v2.1 reads fine through the v2.0 path
    sequential_step_sampling: false
    per_device_batch_size: 4                          # unfreeze + horizon-40 DiT; smoke-confirm VRAM then raise
    load_all_data_for_training: true
    video_backend: pyav                              # h264 here; pyav (thread_count=1) is leak-free and box-proven
    include_state: true                              # DEFAULT OFF — without this the model is (image,prompt)-only

trainer:
  max_train_steps: 6000                              # ~6.3 ep at bs4 (3815 frames) — standard VLA epoch budget (user: max ~6ep)
  num_warmup_steps: 300
  save_interval: 600                                 # 10 even slices; open-loop MSE sweep finds the peak
  eval_interval: 100000                              # no in-train sim eval (open-loop MSE watcher scores ckpts)
  repeated_diffusion_steps: 4                        # GR00T head default 8; horizon-40 is 2.5x PickOrange → start at 4, raise if VRAM headroom
  keep_last_checkpoints: 4                           # 4 x ~6.6G(12-layer trunc) = ~26G; on-box eval scores before prune
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05                        # active: lr for the unfrozen top-4 VLM layers (gentle, anti-forgetting)
    action_model: 1.0e-04                             # head
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: 'qwen_vl_interface'                 # freezes whole VLM; apply_partial_unfreeze re-enables top-4 AFTER
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true                        # dead field on Qwen3 path; lower per_device_batch_size if VRAM tight
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

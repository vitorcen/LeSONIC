# UNITREE_G1_SONIC — StarVLA QwenPI_v3 (Qwen3.5-4B frozen VLM + PI_v3 LayerwiseFM head)
# A/B baseline vs GR00T N1.7 on the SAME LAFAN flow3 dataset / SAME sample budget
# (GR00T anchor: 6000 steps x global-batch 4 = 24k samples, loss 0.052,
#  open-loop MSE avg 0.00257, all 8 windows <= 0.004). See
# doc/sonic_starvla_swap_brainstorm.html §11 for every decision below.
#
# Qwen3.5-4B: hidden 2560 / 32 text layers (natively multimodal). QwenPI_v3
# auto-overrides vl_hidden_dim/num_vl_layers at runtime and builds the
# LayerwiseFM DiT with depth = 32 @ action_dit_hidden_dim=1024.
# REQUIRES transformers >= 5.2.0 (local env: starvla_eval_qwen35).
run_id: sonic_qwen3_5_4b_pi_v3
run_root_dir: /home/david/work/isaaclab-experience/LeSONIC/outputs/starvla
seed: 42
wandb_entity: ""
wandb_project: starVLA_SONIC
is_debug: false
version_id: "0.21"

framework:
  name: QwenPI_v3
  qwenvl:
    base_vlm: Qwen/Qwen3.5-4B          # resolved from local HF cache (offline-safe)
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2560                # hygiene only; auto-overridden at runtime
  action_model:
    action_model_type: LayerwiseFM     # PI_v3 head
    action_dim: 78                     # motion_token(64) + left/right hand joints(7+7) — mirrors GR00T embodiment
    state_dim: 46                      # joints(43, fingers zero-filled) + projected_gravity(3)
    action_horizon: 40                 # SONIC WBC chunk (PI_v3 default 16 stretched 2.5x — known risk, pre-registered)

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /home/david/work/isaaclab-experience/LeSONIC/datasets
    data_mix: sonic_lafan_flow3
    lerobot_version: v2.0              # v2.1 reads fine through the v2.0 path
    sequential_step_sampling: false
    per_device_batch_size: 4           # 24k samples / bs4 = 6000 steps, epoch-matched to GR00T
    load_all_data_for_training: true
    video_backend: torchvision_av      # h264 here (not av1), but this backend is the patched known-good one
    include_state: true                # DEFAULT IS OFF — without this the model is (image,prompt)-only

trainer:
  max_train_steps: 6000                # = GR00T flow3 sample budget; MUST stay a multiple of save_interval
  num_warmup_steps: 300
  save_interval: 500
  eval_interval: 100000                # no in-train sim eval
  repeated_diffusion_steps: 1          # forward() reads trainer.*, default would be 16 -> VRAM blow-up.
                                       # 2 OOMed at step 1 on 24G (22.2G + 954MiB ask) -> 1 (first OOM lever, bs stays 4)
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: 'qwen_vl_interface'  # freeze 4B VLM, train PI_v3 head only
  keep_last_checkpoints: 3             # atomic-save + prune patch (train_starvla.py)
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1       # deepspeed_zero2.yaml hardcodes 1 — must match
  gradient_checkpointing: true
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

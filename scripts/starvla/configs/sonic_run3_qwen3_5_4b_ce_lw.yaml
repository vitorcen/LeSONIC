# UNITREE_G1_SONIC run3 — QwenPI_CE + layerwise VLM features (lever ② of the
# post-CE improvement plan, doc §11.3). Identical to sonic_run3_qwen3_5_4b_ce.yaml
# except ce_layerwise: the CE head consumes a learned softmax mix over ALL VLM
# hidden layers instead of last-hidden-only. Compare against the v1 run3 anchor:
#   MSE64 0.0117 (argmax), bin_acc 50.5%; template baseline 0.0236.
run_id: sonic_run3_qwen3_5_4b_ce_lw
run_root_dir: /home/david/work/isaaclab-experience/LeSONIC/outputs/starvla
seed: 42
wandb_entity: ""
wandb_project: starVLA_SONIC
is_debug: false
version_id: "0.21"

framework:
  name: QwenPI_CE
  qwenvl:
    base_vlm: Qwen/Qwen3.5-4B
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2560
  action_model:
    action_model_type: LayerwiseFM   # unused by QwenPI_CE (kept for config-compat plumbing)
    action_dim: 78
    state_dim: 46
    action_horizon: 40
    n_bins: 33                       # k in [-16,16], value = k/16 (observed range k in [-11,9])
    grid: 16.0
    ce_hidden_dim: 1024
    ce_num_layers: 6
    ce_num_heads: 8
    ce_layerwise: true               # lever ②: ELMo-style learned mix over all 37 hidden layers

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /home/david/work/isaaclab-experience/LeSONIC/datasets
    data_mix: sonic_lafan_run3
    lerobot_version: v2.0
    sequential_step_sampling: false
    per_device_batch_size: 4
    load_all_data_for_training: true
    video_backend: torchvision_av
    include_state: true

trainer:
  max_train_steps: 2000              # 749 frames x bs4 -> ~10.7 epochs; head is ~90M, converges fast
  num_warmup_steps: 100
  save_interval: 500
  eval_interval: 100000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: 'qwen_vl_interface'
  keep_last_checkpoints: 2
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
